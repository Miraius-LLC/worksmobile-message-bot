# =============================================================================
# Cloud Build パイプライン: GitHub push → build → push → Cloud Run へ deploy
#
# トリガー側で `filename: cloudbuild.yaml` を指定すること。inline build を
# 残したままだとこのファイルは読まれない。
# =============================================================================

substitutions:
  _AR_HOSTNAME: asia-northeast1-docker.pkg.dev
  _AR_REPOSITORY: cloud-run-source-deploy
  _SERVICE_NAME: worksmobile-message-bot
  _DEPLOY_REGION: asia-northeast1
  _SERVICE_ACCOUNT: worksmobile-message-bot-sa@office-381404.iam.gserviceaccount.com
  _SECRET_CLIENT_SECRET: lineworks-client-secret
  _SECRET_PRIVATE_KEY: lineworks-private-key
  _SECRET_BASIC_ID: lineworks-basic-id
  _SECRET_BASIC_PASS: lineworks-basic-pass
  _SECRET_BOT_SECRET: lineworks-bot-secret
  # 受信 callback の転送先 (= 501 / scheduler-501 の /callback)。非機密なのでデフォルト値を直書き。
  # 501 の Cloud Run default URL (project hash 由来で安定)
  _FORWARD_501_CALLBACK_URL: https://scheduler-501-6dkxmuzina-an.a.run.app/callback
  # `_CLIENT_ID` / `_SERVICE_ACCOUNT_LW` / `_BOT_ID` は **公開リポに値を残さない**ため、
  # Cloud Build トリガーのサブスティテューション設定で注入する (GCP Console: Cloud Build →
  # Triggers → 該当トリガー編集 → "Substitution variables" セクション)。
  # トリガー側で未設定だと deploy step で `${_CLIENT_ID}` 等が空文字に展開され、
  # Cloud Run の env が空で更新 → 起動時の Zod validation で fail (fail-fast 経由で気付ける)

options:
  logging: CLOUD_LOGGING_ONLY
  substitutionOption: ALLOW_LOOSE

images:
  - ${_AR_HOSTNAME}/${PROJECT_ID}/${_AR_REPOSITORY}/${REPO_NAME}/${_SERVICE_NAME}:${SHORT_SHA}

steps:
  # 0) トリガー substitution の必須項目が注入されているか検証する
  #    (空のまま deploy すると Cloud Run の env が "" で更新され、起動時の Zod validation で
  #    fail → 旧リビジョンに traffic が残ったまま新リビジョンだけ起動失敗を繰り返す事故が起きる)
  - id: validate-substitutions
    name: gcr.io/cloud-builders/gcloud
    entrypoint: bash
    args:
      - -c
      - |
        set -eu
        missing=()
        [ -n "${_CLIENT_ID}" ]         || missing+=("_CLIENT_ID")
        [ -n "${_SERVICE_ACCOUNT_LW}" ] || missing+=("_SERVICE_ACCOUNT_LW")
        [ -n "${_BOT_ID}" ]            || missing+=("_BOT_ID")
        if [ "${#missing[@]}" -gt 0 ]; then
          echo "ERROR: Cloud Build trigger substitution(s) missing: ${missing[*]}" >&2
          echo "GCP Console > Cloud Build > Triggers > 該当トリガー > Substitution variables で値を設定してください" >&2
          exit 1
        fi

  # 0.5) bun test を全件走らせる
  #     - lefthook の pre-push hook を `--no-verify` でバイパスされた場合の最後の砦
  #     - 失敗すれば build step に進まないため、未テストコードを本番反映できない
  #     - image の bun バージョンは Dockerfile の `ARG BUN_VERSION` と `.tool-versions`
  #       に合わせる (3 箇所揃えること、片方だけ上げない)
  - id: test
    name: oven/bun:1.3.14-debian
    entrypoint: bash
    args:
      - -c
      - |
        set -eu
        bun install --frozen-lockfile
        bun test

  # 1) Docker イメージビルド (BuildKit 限定構文は Dockerfile 側で使用しない)
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_AR_HOSTNAME}/${PROJECT_ID}/${_AR_REPOSITORY}/${REPO_NAME}/${_SERVICE_NAME}:${SHORT_SHA}
      - -f
      - Dockerfile
      - .

  # 2) Artifact Registry へ push
  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_AR_HOSTNAME}/${PROJECT_ID}/${_AR_REPOSITORY}/${REPO_NAME}/${_SERVICE_NAME}:${SHORT_SHA}

  # 3) Cloud Run へ deploy
  #    - 構成を可能な限り cloudbuild.yaml に明示し、手動 `gcloud run services update` での
  #      drift を防ぐ。CLIENT_ID / SERVICE_ACCOUNT / BOT_ID も毎回再アサートするため、
  #      手動で `--clear-env-vars` 等が打たれても次の deploy で値が戻る
  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - services
      - update
      - ${_SERVICE_NAME}
      - --platform=managed
      - --region=${_DEPLOY_REGION}
      - --image=${_AR_HOSTNAME}/${PROJECT_ID}/${_AR_REPOSITORY}/${REPO_NAME}/${_SERVICE_NAME}:${SHORT_SHA}

      # --- 認証 / Identity ---
      - --service-account=${_SERVICE_ACCOUNT}

      # --- Secret Manager マウント (機密 env) ---
      - --update-secrets=CLIENT_SECRET=${_SECRET_CLIENT_SECRET}:latest,PRIVATE_KEY=${_SECRET_PRIVATE_KEY}:latest,BASIC_ID=${_SECRET_BASIC_ID}:latest,BASIC_PASS=${_SECRET_BASIC_PASS}:latest,BOT_SECRET=${_SECRET_BOT_SECRET}:latest

      # --- 通常 env (機密度の低い設定値) ---
      #     FORWARD_501_CALLBACK_URL: 受信 callback を 501 (scheduler-501) に転送する先 (案 B)
      - --update-env-vars=GOOGLE_CLOUD_PROJECT=${PROJECT_ID},CLIENT_ID=${_CLIENT_ID},SERVICE_ACCOUNT=${_SERVICE_ACCOUNT_LW},BOT_ID=${_BOT_ID},FORWARD_501_CALLBACK_URL=${_FORWARD_501_CALLBACK_URL}

      # --- ネットワーク ---
      - --no-use-http2  # コンテナは HTTP/1.1、Cloud Run frontend が HTTP/2 終端
      - --port=8080
      - --ingress=all
      # 公開設定 (allUsers の roles/run.invoker) は service の IAM ポリシーとして
      # 別途管理する。`gcloud run services update` は --allow-unauthenticated を
      # 受け付けないため、このパイプラインでは触らない

      # --- スケーリング / 並行性 ---
      - --min-instances=1
      - --max-instances=20
      - --concurrency=80
      - --timeout=300s

      # --- リソース ---
      - --cpu=1
      - --memory=512Mi
      - --execution-environment=gen2
      - --cpu-boost  # cold start 高速化

      # --- ラベル (リビジョンの追跡用) ---
      - --labels=managed-by=cloud-build,commit-sha=${COMMIT_SHA},gcb-build-id=${BUILD_ID}

      - --quiet
